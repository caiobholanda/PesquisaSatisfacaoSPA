<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso pelo Hub — Spa Gran Marquise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F5F0E6;
    --surface: #FFFFFF;
    --border: #E4DAC6;
    --text: #1A1A1A;
    --muted: #6B6B6B;
    --gold: #D4953D;
    --gold-dark: #C2832F;
    --indigo: #5B6796;
  }
  *,*::before,*::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--paper);
    color: var(--text);
    font-family: 'DM Sans', system-ui, sans-serif;
    padding: 2rem 1rem;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 28px 64px -22px rgba(91,103,150,.20), 0 2px 8px rgba(26,26,26,.04);
    max-width: 460px;
    width: 100%;
    padding: 3rem 2.5rem 2.5rem;
    text-align: center;
  }
  .logo {
    width: 168px;
    margin: 0 auto 1.5rem;
    display: block;
  }
  .gold-rule {
    width: 56px;
    height: 2px;
    background: var(--gold);
    margin: 0 auto 1.5rem;
    border-radius: 2px;
  }
  h1 {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 500;
    font-size: 1.7rem;
    margin: 0 0 .65rem;
    color: var(--text);
    letter-spacing: -.01em;
  }
  p.lead {
    color: var(--muted);
    font-size: .95rem;
    line-height: 1.6;
    margin: 0 0 1.75rem;
  }
  .badge-sistema {
    display: inline-block;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: .65rem;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--gold-dark);
    background: rgba(212,149,61,.12);
    padding: .35rem .8rem;
    border-radius: 999px;
    margin-bottom: 1.25rem;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: .6rem;
    background: var(--text);
    color: var(--paper);
    border: none;
    border-radius: 8px;
    padding: .9rem 1.75rem;
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: transform .15s ease, box-shadow .2s ease, background .2s ease;
    box-shadow: 0 8px 18px -6px rgba(26,26,26,.32);
  }
  .btn:hover { background: #2A2A2A; transform: translateY(-1px); box-shadow: 0 12px 24px -8px rgba(26,26,26,.40); }
  .btn:active { transform: translateY(0); }
  .hint {
    margin-top: 1.5rem;
    font-size: .78rem;
    color: var(--muted);
    opacity: .75;
  }
  @media (max-width: 480px) {
    .card { padding: 2.25rem 1.5rem 2rem; }
    h1 { font-size: 1.4rem; }
  }
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="https://letsimage.s3.amazonaws.com/editor/granmarquise/imgs/1760033174793-hotelgranmarquise_pos_footer.png" alt="Gran Marquise">
    <div class="gold-rule"></div>
    <span class="badge-sistema">Pesquisa de Satisfação · Spa</span>
    <h1>Faça login pelo Hub</h1>
    <p class="lead">O acesso administrativo ao painel do Spa é centralizado no Hub Gran Marquise. Clique abaixo para entrar.</p>
    <a id="btn-hub" class="btn" href="#">
      Acessar via Hub
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </a>
    <div class="hint">hub-granmarquise.fly.dev</div>
  </div>
<script>
  (function () {
    var HUB = 'https://hub-granmarquise.fly.dev';
    var params = new URLSearchParams(location.search);
    var next = params.get('next') || (location.origin + '/admin');
    document.getElementById('btn-hub').href = HUB + '/?next=' + encodeURIComponent(next);
  })();
</script>
</body>
</html>
